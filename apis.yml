---
aid: western
name: Western University
description: >-
  Western University is a public research university in London, Ontario, Canada,
  ranked #120 in the QS World University Rankings 2025. Its public, machine-readable
  developer footprint is centered on Western Libraries: the institutional repository
  Scholarship@Western migrated in 2025 to Scholaris, a national shared DSpace 8 service
  hosted by Scholars Portal, which exposes a live DSpace REST API and an OAI-PMH metadata
  harvesting endpoint. Western Technology Services also operates an institutional
  Single Sign-On service supporting SAML2, OAuth, OpenID Connect, and CAS, but it is
  gated behind institutional affiliation rather than self-service. Western does not
  publish an official open course/timetable or open-data API; timetable data is
  documented only as scrape targets and via unofficial third-party projects.

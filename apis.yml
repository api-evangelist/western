apis:
  - aid: western:scholaris-rest
    name: Scholaris (Scholarship@Western) DSpace REST API
    description: >-
      DSpace 8.3 REST (HAL) API for Western University's Open Repository, Scholarship@Western,
      hosted on the national Scholaris service by Scholars Portal. Exposes communities,
      collections, items, bitstreams, and discovery search over Western's theses,
      dissertations, conference proceedings, and other scholarly outputs. The API root
      is publicly readable; some core endpoints require authentication for write or
      protected access.
    humanURL: https://uwo.scholaris.ca/home
    baseURL: https://uwo.scholaris.ca/server/api
    tags: [ Library, Institutional Repository, Open Access, DSpace, Repository ]
    properties:
      - type: Documentation
        url: https://uwo.scholaris.ca/home
      - type: Documentation
        url: https://uwo.scholaris.ca/server/api
  - aid: western:scholaris-oai
    name: Scholarship@Western OAI-PMH
    description: >-
      OAI-PMH 2.0 metadata harvesting endpoint for Western University's Open Repository
      (DSpace 8 on Scholaris). Supports the standard OAI verbs (Identify, ListRecords,
      ListSets, GetRecord, etc.) for third-party harvesting and discovery of Western's
      institutional repository metadata.
    humanURL: https://uwo.scholaris.ca/home
    baseURL: https://uwo.scholaris.ca/server/oai/request
    tags: [ Library, Institutional Repository, OAI-PMH, Open Access, Metadata Harvesting ]
    properties:
      - type: Documentation
        url: https://ir.lib.uwo.ca/about.html
      - type: Documentation
        url: https://uwo.scholaris.ca/server/oai/request?verb=Identify
  - aid: western:sso
    name: Western Single Sign-On (SAML2 / OAuth / OIDC / CAS)
    description: >-
      Western Technology Services operates an institutional Single Sign-On service
      supporting SAML2, OAuth, OpenID Connect (OIDC), and CAS for authenticating users
      against their Western institutional account. Integration is request-based via WTS
      and gated behind institutional affiliation rather than open self-service registration.
    humanURL: https://wts.uwo.ca/services/o/single-sign-on-sso-saml2-oauth-oidc-cas/index.html
    tags: [ Identity, Authentication, SSO, SAML, OAuth, OpenID Connect, CAS ]
    properties:
